[build]
  command = "npm run build"
  publish = ".next"

# Runs the App Router, server actions, sitemap/robots, image optimization,
# and the security headers from next.config.ts on Netlify Functions.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Match the local toolchain (Node 22). Do NOT put secrets here — this file is
  # committed to Git. App env vars go in Netlify's dashboard.
  NODE_VERSION = "22"

  # These keys are PUBLIC by design and are inlined into the client bundle, so
  # the secrets scanner is expected to see them in the build output. Every
  # NEXT_PUBLIC_* var is browser-exposed by definition; the Razorpay KEY_ID is a
  # publishable key. The TRULY secret vars (SUPABASE_SERVICE_ROLE_KEY,
  # R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, RAZORPAY_KEY_SECRET,
  # CLOUDFLARE_ACCOUNT_ID) are intentionally NOT listed and remain scanned.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_R2_PUBLIC_URL,RAZORPAY_KEY_ID,NEXT_PUBLIC_RAZORPAY_KEY_ID,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"
